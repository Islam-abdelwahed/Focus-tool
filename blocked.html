<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Focused! 📚</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f7ff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 1rem;
        }

        h1 {
            color: #1a237e;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            margin: 1.5rem 0;
        }

        .warning {
            color: #d32f2f;
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        #timer {
            font-size: 2.5rem;
            color: #1a237e;
            padding: 1.5rem;
            background: #f8f9ff;
            border-radius: 15px;
            margin: 2rem 0;
            border: 3px dashed #ffd700;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            p {
                font-size: 1rem;
            }
            #timer {
                font-size: 1.8rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning">🚨</div>
        <h1>I Caught You! 🕵️♂️</h1>
        <p>You should be studying right now!<br>
        Don't waste your time on social media! 📱❌</p>
        
        <div id="timer">⌛ Calculating time remaining...</div>
        
        <p>📚 Stay focused! Your future self will thank you! 💪<br>
        🎯 20 minutes of focused study > 2 hours of distracted scrolling</p>
    </div>

    <script>
        const endTime = {{END_TIME}};
        
        function updateTimer() {
            const remaining = endTime - Date.now();
            
            if (remaining <= 0) {
                document.getElementById('timer').innerHTML = 
                    '⏰ Time\'s up! You can take a break now! 🎉';
                return;
            }

            const hours = Math.floor(remaining / 3600000);
            const minutes = Math.floor((remaining % 3600000) / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);

            document.getElementById('timer').innerHTML = 
                `⏳ Focus Time Remaining:<br>` +
                `${hours.toString().padStart(2, '0')}h ` +
                `${minutes.toString().padStart(2, '0')}m ` +
                `${seconds.toString().padStart(2, '0')}s`;

            setTimeout(updateTimer, 1000);
        }

        updateTimer();
    </script>
</body>
</html>
